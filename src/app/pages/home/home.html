
<app-combination></app-combination>
<app-card></app-card>

<section id="contact" class="contact-section">

  <div class="contact-wrapper">

    <div class="contact-left">
      <span class="contact-eyebrow">Get in Touch</span>
      <h2 class="contact-title">General<br>Inquiry</h2>
      <p class="contact-sub">Have a question about DROID 5.0? Reach out and our team will get back to you shortly.</p>

      <div class="contact-meta">
        <div class="contact-meta-item">
          <span class="contact-meta-icon">◈</span>
          <div>
            <div class="contact-meta-label">Email</div>
            <div class="contact-meta-value">ieee&#64;fisat.ac.in</div>
          </div>
        </div>
        <div class="contact-meta-item">
          <span class="contact-meta-icon">◈</span>
          <div>
            <div class="contact-meta-label">Event</div>
            <div class="contact-meta-value">July 13 – 15, 2026</div>
          </div>
        </div>
        <div class="contact-meta-item">
          <span class="contact-meta-icon">◈</span>
          <div>
            <div class="contact-meta-label">Organiser</div>
            <div class="contact-meta-value">IEEE RAS SBC FISAT</div>
          </div>
        </div>
      </div>
    </div>

    <div class="contact-right">
      <form class="contact-form">

        <div class="field-group">
          <label class="field-label">Full Name</label>
          <input type="text" class="field-input" placeholder="Enter your full name" required>
        </div>

        <div class="field-group">
          <label class="field-label">Email Address</label>
          <input type="email" class="field-input" placeholder="you@example.com" required>
        </div>

        <div class="field-group">
          <label class="field-label">Message</label>
          <textarea class="field-input field-textarea" rows="5" placeholder="How can we help you?" required></textarea>
        </div>

        <button type="submit" class="contact-btn">
          <span class="contact-btn-text">Submit Message</span>
          <span class="contact-btn-arrow">&#8594;</span>
        </button>

      </form>
    </div>

  </div>

</section>


<app-footer></app-footer>
