<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');

  :host {
    --ieee-orange: #ff8c00;
    --pure-black: #000000;
    --nav-text: #ffffff;
    --font-main: 'Outfit', sans-serif;
    --transition-speed: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .droid-navbar {
    background: var(--pure-black) !important;
    padding: 15px 8% !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    font-family: var(--font-main);
  }

  .logo {
    font-size: 1.25rem;
    font-weight: 900;
    letter-spacing: 1.5px;
    color: var(--ieee-orange) !important;
    text-transform: uppercase;
    text-decoration: none;
    transition: var(--transition-speed);
  }

  .logo span {
    color: var(--ieee-orange);
    font-weight: 400;
    margin-left: 1px;
  }

  .navbar-collapse {
    justify-content: flex-end;
  }

  .navbar-nav .nav-link {
    color: var(--nav-text) !important;
    font-size: 0.75rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    margin-left: 35px !important;
    padding: 2px 0 !important;
    position: relative;
    opacity: 0.85;
    transition: var(--transition-speed);
    cursor: pointer;
  }

  .navbar-nav .nav-link::after {
    content: '';
    position: absolute;
    width: 0;
    height: 1.5px;
    bottom: -2px;
    left: 0;
    background-color: var(--ieee-orange);
    transition: var(--transition-speed);
  }

  .navbar-nav .nav-link:hover {
    opacity: 1;
    color: var(--ieee-orange) !important;
  }

  .navbar-nav .nav-link:hover::after {
    width: 100%;
  }

  .custom-toggler {
    border: none !important;
    outline: none !important;
  }

  @media (max-width: 991px) {
    .navbar-collapse {
      background: var(--pure-black);
      padding: 30px 0;
      text-align: center;
    }
    .navbar-nav .nav-link {
      margin-left: 0 !important;
      margin-bottom: 20px;
    }
  }
</style>

<nav class="navbar navbar-expand-lg droid-navbar sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand logo" href="#">DROID <span>5.0</span></a>

    <button class="navbar-toggler custom-toggler" type="button"
      data-bs-toggle="collapse" data-bs-target="#droidNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="droidNavbar">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" routerLink="About">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="Register" (click)="scrollToContact()">Inquiry</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="Contact">Register</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
